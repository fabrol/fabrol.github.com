<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">

<head>
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
	<title>FullScreen Backgrounds - fullPage.js</title>
	<meta name="author" content="Alvaro Trigo Lopez" />
	<meta name="description" content="fullPage full-screen backgrounds." />
	<meta name="keywords"  content="fullpage,jquery,demo,screen,fullscreen,backgrounds,full-screen" />
	<meta name="Resource-type" content="Document" />


	<link rel="stylesheet" type="text/css" href="css/jquery.fullPage.css" />
	<link rel="stylesheet" type="text/css" href="css/unsemantic-grid-responsive.css" />
	<link href='http://fonts.googleapis.com/css?family=Lobster' rel='stylesheet' type='text/css'>

	<style>

	/* Style for our header texts
	* --------------------------------------- */
	h1{
		font-size: 5em;
		font-family: arial,helvetica;
		color: #fff;
		margin:0;
		padding:0;
	}

	/* Centered texts in each section
	* --------------------------------------- */
	.section{
	}


	/* Backgrounds will cover all the section
	* --------------------------------------- */
	#section0,
	#section1,
	#section2{
		background-repeat: repeat;
	}

	/* Defining each sectino background and styles
	* --------------------------------------- */

	#section0{
    background-image: url(img/groovepaper.png);
    padding: 25% 0 0 0;
     
	}

	.header{
	font-family: sans-serif;
     background: #fff;
     text-align: center;
    }

    .centered{
    	float: none;
    	margin: 0 auto;
    }

	#section0 h1{
		font-family: 'Lobster' , cursive;
		color: rgb(75, 75, 75);
	}

	#section1{
		background-image: url(img/vertical_cloth.png);
		padding: 6% 0 0 0;
		text-align:center;
	
	}
	#section2{
		background-image: url(img/back1_small.jpg);
		padding: 6% 0 0 0;
		text-align:center;
	
	}
	#section2 h1{
		color: #000;
	}


	</style>

	<!--[if IE]>
		<script type="text/javascript">
			 var console = { log: function() {} };
		</script>
	<![endif]-->

	<script src="http://ajax.googleapis.com/ajax/libs/jquery/1.8.3/jquery.min.js"></script>
	<script src="http://ajax.googleapis.com/ajax/libs/jqueryui/1.9.1/jquery-ui.min.js"></script>

	  <script src="js/jquery.fullPage.min.js"></script>

    <script type="text/javascript">
    $(document).ready(function() {
      $('#fullpage').fullpage({
        verticalCentered: false,
        anchors: ['firstPage', 'secondPage', '3rdPage', '4thpage', 'lastPage']

      });
    });
    </script>
  

</head>
<body>

<div id="fullpage">
	<div class="section " id="section0">
		  <div class="grid-container">
    <div class="grid-33 mobile-grid-100 centered grid-parent">
    	<div class="grid-30">
      <h1 class="header">
        Hi!
      </h1>
    	</div>
    	<div class="grid-70">
      <h1 class="header">
        Bye!
      </h1>
    	</div>
    </div>
  </div>
		</div>
	<div class="section" id="section1"><h1>Lovely images <br />for a lovely page</h1></div>
	<div class="section" id="section2"><h1>One Image = One thousand words</h1></div>
</div>

</body>
</html>
